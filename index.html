<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https:; media-src 'self' blob:; frame-src 'none'; object-src 'none';" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Illumina Browser</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-theme="mist">
    <div id="page-progress" style="position:fixed;top:0;left:0;right:0;height:2px;z-index:9999;background:var(--accent);transform:scaleX(0);transform-origin:left;opacity:0;pointer-events:none;transition:transform 200ms ease,opacity 200ms ease"></div>
    <div class="browser-shell">

      <header class="chrome-shell">
        <!-- Satır 1: logo · sekmeler · + butonu · güvenlik -->
        <div class="title-row">
          <button id="brand-button" class="brand-button" type="button" title="Ana sayfa">
            <img src="logo.png" alt="Illumina" class="brand-logo" />
            <span>Illumina</span>
          </button>
          <div class="tabs-row">
            <div id="tabs-bar" class="tabs-bar"></div>
            <button id="new-tab-button" class="tab-add-button" type="button" title="Yeni sekme (Ctrl+T)">+</button>
          </div>
          <div class="security-badge">
            <span class="security-dot"></span>
            <span id="security-pill">Standard</span>
          </div>
        </div>

        <!-- Satır 2: nav · adres · araçlar -->
        <div class="toolbar-row">
          <div class="nav-actions">
            <button id="back-button" class="control-button" type="button" title="Geri (Alt+←)" disabled>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button id="forward-button" class="control-button" type="button" title="İleri (Alt+→)" disabled>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button id="reload-button" class="control-button" type="button" title="Yenile (F5)">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M12 7A5 5 0 0 1 3 11.2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M2 7A5 5 0 0 1 11 2.8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M11 1v3h-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 13v-3h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>

          <form id="address-form" class="address-form">
            <button id="site-info-btn" class="site-info-btn" type="button" title="Site bilgisi">
              <svg id="site-info-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
                <path d="M6.5 1a5.5 5.5 0 1 0 0 11A5.5 5.5 0 0 0 6.5 1Z" stroke="currentColor" stroke-width="1.3"/>
                <path d="M6.5 6v3.5M6.5 4h.01" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </button>
            <input id="address-input" class="address-input" type="text" autocomplete="off" spellcheck="false" placeholder="Ara ya da adres gir" />
          </form>

          <div class="toolbar-actions">
            <button id="bookmark-button" class="control-button toolbar-icon" type="button" title="Yer imi (Ctrl+D)">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path class="bookmark-path" d="M3 2h9a1 1 0 0 1 1 1v10l-5.5-3L2 13V3a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
            </button>
            <button id="reader-btn" class="control-button toolbar-icon" type="button" title="Okuma modu" style="display:none">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2 3h11M2 6h8M2 9h9M2 12h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
            <div class="toolbar-sep"></div>
            <button id="notes-toggle" class="control-button toolbar-icon" type="button" title="Notlar (Ctrl+N)">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="2" y="1.5" width="11" height="12" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M4.5 5h6M4.5 7.5h6M4.5 10h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            </button>
            <button id="focus-btn" class="control-button toolbar-icon" type="button" title="Odak modu">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2 5V2.5A.5.5 0 0 1 2.5 2H5M10 2h2.5a.5.5 0 0 1 .5.5V5M13 10v2.5a.5.5 0 0 1-.5.5H10M5 13H2.5a.5.5 0 0 1-.5-.5V10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </button>
            <button id="incognito-btn" class="control-button toolbar-icon" type="button" title="Gizli sekme (Ctrl+Shift+N)">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><ellipse cx="7.5" cy="5.5" rx="3" ry="3" stroke="currentColor" stroke-width="1.4"/><path d="M2 13c0-3.038 2.462-5.5 5.5-5.5S13 9.962 13 13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </button>
            <button id="devtools-btn" class="control-button toolbar-icon" type="button" title="Geliştirici araçları (F12)" style="display:none">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M5 5L2 7.5 5 10M10 5l3 2.5-3 2.5M8.5 3.5l-2 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="toolbar-sep"></div>
            <button id="hist-popup-btn" class="control-button toolbar-icon" type="button" title="Geçmiş (Ctrl+H)">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.4"/><path d="M7.5 4.5v3.2l2 1.3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </button>
            <button id="dl-popup-btn" class="control-button toolbar-icon" type="button" title="İndirmeler (Ctrl+J)">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 2v8M4 7.5l3.5 3.5L11 7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2.5 12.5h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
            <div class="toolbar-sep"></div>
            <!-- Araçlar menüsü -->
            <button id="tools-menu-btn" class="control-button toolbar-icon" type="button" title="Araçlar">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                <circle cx="7.5" cy="3.5" r="1.3" fill="currentColor"/>
                <circle cx="7.5" cy="7.5" r="1.3" fill="currentColor"/>
                <circle cx="7.5" cy="11.5" r="1.3" fill="currentColor"/>
              </svg>
            </button>
            <div class="toolbar-sep"></div>
            <button class="control-button toolbar-icon" type="button" data-page="settings" title="Ayarlar (Ctrl+,)">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none" style="overflow:visible"><circle cx="7.5" cy="7.5" r="2" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M7.5 1.5v2M7.5 11.5v2M1.5 7.5h2M11.5 7.5h2M3.4 3.4l1.4 1.4M10.2 10.2l1.4 1.4M10.2 4.8l1.4-1.4M3.4 11.6l1.4-1.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>

        <!-- Find bar -->
        <div id="find-bar" class="find-bar">
          <input id="find-input" type="text" placeholder="Sayfada ara…" autocomplete="off" spellcheck="false" />
          <span id="find-count" class="find-count"></span>
          <button id="find-prev"  class="find-btn" type="button" title="Önceki">↑</button>
          <button id="find-next"  class="find-btn" type="button" title="Sonraki">↓</button>
          <button id="find-close" class="find-btn" type="button" title="Kapat">✕</button>
        </div>

        <!-- Yer imi şeridi -->
        <div id="bookmark-strip" class="bookmark-strip"></div>
      </header>

      <!-- ══ POPUPLAR ═══════════════════════════════════════════════════════ -->

      <div id="dl-popup" class="dl-popup">
        <div class="dl-popup-header">
          <span>İndirmeler</span>
          <button type="button" class="dl-popup-all" id="dl-popup-all-btn">Tümünü gör</button>
        </div>
        <div class="dl-popup-list"></div>
      </div>

      <div id="hist-popup" class="dl-popup" style="width:280px">
        <div class="dl-popup-header">
          <span>Son Ziyaretler</span>
          <button type="button" class="dl-popup-all" id="hist-popup-all-btn">Tümünü gör</button>
        </div>
        <div class="hist-popup-list"></div>
      </div>

      <div id="site-info-popup" class="site-info-popup">
        <div class="si-header">
          <span id="si-lock-icon" class="si-lock"></span>
          <div class="si-title-wrap">
            <span id="si-status">Bağlantı güvenli</span>
            <span id="si-host" class="si-host"></span>
          </div>
        </div>
        <div class="si-divider"></div>
        <div class="si-section">
          <div class="si-row"><span class="si-label">Protokol</span><span id="si-protocol" class="si-value">—</span></div>
          <div class="si-row"><span class="si-label">İzinler</span><span id="si-perms" class="si-value">—</span></div>
        </div>
        <div id="si-shields-row" style="padding:3px 14px;display:none"></div>
        <div id="si-safety-row" style="padding:6px 14px 2px;display:none"></div>
        <div class="si-divider"></div>
        <div class="si-section">
          <div class="si-perm-row">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1.5a4 4 0 0 1 4 4v2l1 1.5H1.5L2.5 7.5v-2a4 4 0 0 1 4-4Z" stroke="currentColor" stroke-width="1.2"/><path d="M5 9.5a1.5 1.5 0 0 0 3 0" stroke="currentColor" stroke-width="1.2"/></svg>
            <span>Bildirimler</span><span id="si-notif-state" class="si-perm-state"></span>
          </div>
          <div class="si-perm-row">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="5.5" r="2" stroke="currentColor" stroke-width="1.2"/><path d="M6.5 1C4.015 1 2 3.015 2 5.5c0 3.75 4.5 6.5 4.5 6.5s4.5-2.75 4.5-6.5C11 3.015 8.985 1 6.5 1Z" stroke="currentColor" stroke-width="1.2"/></svg>
            <span>Konum</span><span id="si-loc-state" class="si-perm-state"></span>
          </div>
          <div class="si-perm-row">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="3.5" width="8" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M9 5.5l3-1.5v5l-3-1.5" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
            <span>Kamera</span><span id="si-cam-state" class="si-perm-state"></span>
          </div>
          <div class="si-perm-row">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="4.5" y="1" width="4" height="7" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M2 6.5a4.5 4.5 0 0 0 9 0M6.5 11v-1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            <span>Mikrofon</span><span id="si-mic-state" class="si-perm-state"></span>
          </div>
        </div>
      </div>

      <!-- Araçlar (üç nokta) popup -->
      <div id="tools-menu-popup" class="tools-menu-popup" style="display:none">
        <div id="tools-web-section" class="tools-menu-section" style="display:none">
          <div class="tools-menu-label">Sayfa Araçları</div>
          <button class="tools-menu-item" id="tm-mail">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="3" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M1 5l6 4 6-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            <span>Mail & Takvim</span>
          </button>
          <button class="tools-menu-item" id="tm-command-bar">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="10" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M3 5.5h8M3 8.5h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            <span>Komut Çubuğu</span><kbd>Ctrl+K</kbd>
          </button>
          <button class="tools-menu-item" id="tm-pip">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="7" y="6" width="5" height="4" rx="1" stroke="currentColor" stroke-width="1.2"/></svg>
            <span>Picture-in-Picture (PiP)</span>
          </button>
          <button class="tools-menu-item" id="tm-split">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/><line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="1.3"/></svg>
            <span>Split View</span>
          </button>
          <button class="tools-menu-item" id="tm-translate">
            <svg width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M1.5 3h6M4.5 1.5v1.5M3 7s1.5-1 3-1 3 1 3 1M7.5 3.5C7 5 6 6.5 4.5 7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M8 9l1.5 4.5M13 9l-1.5 4.5M8.7 12h3.6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Sayfayı Çevir
          </button>
          <button class="tools-menu-item" id="tm-screenshot">
            <svg width="14" height="14" viewBox="0 0 15 15" fill="none"><rect x="1.5" y="3" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/><circle cx="7.5" cy="7.5" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M5.5 3V2M9.5 3V2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            Ekran Görüntüsü <kbd>Ctrl+Shift+S</kbd>
          </button>
          <button class="tools-menu-item" id="tm-sticky">
            <svg width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M3 2h9a1 1 0 0 1 1 1v7l-4 4H3a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="1.4"/><path d="M9 10v3.5L13 10H9Z" stroke="currentColor" stroke-width="1.3"/></svg>
            Sayfa Notu
          </button>
          <button class="tools-menu-item" id="tm-script">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M4 3L1 7l3 4M10 3l3 4-3 4M8 1L5 13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Özel Script Çalıştır
          </button>
          <div class="tools-menu-sep"></div>
        </div>
        <div class="tools-menu-section">
          <div class="tools-menu-label">Yönetim</div>
          <button class="tools-menu-item" id="tm-sidepanel">
            <svg width="14" height="14" viewBox="0 0 15 15" fill="none"><rect x="1.5" y="2" width="12" height="11" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M9.5 2v11" stroke="currentColor" stroke-width="1.4"/></svg>
            Yan Panel <kbd>Ctrl+B</kbd>
          </button>
          <button class="tools-menu-item" id="tm-passwords">
            <svg width="14" height="14" viewBox="0 0 15 15" fill="none"><rect x="3" y="6" width="9" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M5 6V4.5a2.5 2.5 0 0 1 5 0V6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="7.5" cy="9.5" r="1" fill="currentColor"/></svg>
            Şifre Yöneticisi
          </button>
          <button class="tools-menu-item" id="tm-sessions">
            <svg width="14" height="14" viewBox="0 0 15 15" fill="none"><rect x="1.5" y="3" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M5 7h5M5 9.5h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            Profil & Oturum Yöneticisi
          </button>
          <button class="tools-menu-item" id="tm-cookies">
            <svg width="14" height="14" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6" stroke="currentColor" stroke-width="1.4"/><circle cx="5" cy="6" r="1" fill="currentColor"/><circle cx="9" cy="5" r=".8" fill="currentColor"/><circle cx="6" cy="10" r=".8" fill="currentColor"/><circle cx="10" cy="9" r="1" fill="currentColor"/></svg>
            Çerez Yöneticisi
          </button>
        </div>
        <div class="tools-menu-sep"></div>
        <div class="tools-menu-section">
          <div class="tools-menu-label">Görünüm</div>
          <button class="tools-menu-item" id="tm-theme">
            <svg width="14" height="14" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.4"/><circle cx="7.5" cy="7.5" r="2" stroke="currentColor" stroke-width="1.3"/></svg>
            Tema & Kişiselleştirme
          </button>
        </div>
      </div>

      <!-- Odak modu barı -->
      <div id="focus-bar" class="focus-bar is-hidden">
        <div class="tabs-bar-focus"></div>
        <button id="focus-exit" class="focus-exit-btn" type="button">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M6 3l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Odaktan çık
        </button>
      </div>

      <!-- Notlar paneli -->
      <div id="notes-panel" class="notes-panel">
        <div class="notes-header">
          <span>Notlarım</span>
          <div style="display:flex;gap:4px">
            <button id="notes-clear" class="notes-btn" type="button">Temizle</button>
            <button id="notes-close" class="notes-btn" type="button">✕</button>
          </div>
        </div>
        <textarea id="notes-textarea" placeholder="Buraya notlarını yaz…"></textarea>
      </div>

      <main class="view-shell">
        <div id="webview-stack" class="webview-stack"></div>
        <div id="tab-loading-overlay" class="tab-loading-overlay">
          <div class="tab-loading-spinner"></div>
        </div>
      </main>
    </div>

    <script src="renderer.js"></script>
    <script src="polish.js"></script>
    <script src="theme.js"></script>
    <script src="panels.js"></script>
    <script src="ui_command.js"></script>
    <script src="tabs.js"></script>
    <script src="research.js"></script>
    <script>
      document.getElementById("dl-popup-all-btn")?.addEventListener("click", () => {
        document.getElementById("dl-popup")?.classList.remove("is-open");
        document.dispatchEvent(new CustomEvent("open-downloads-page"));
      });
      document.getElementById("hist-popup-all-btn")?.addEventListener("click", () => {
        document.getElementById("hist-popup")?.classList.remove("is-open");
        document.dispatchEvent(new CustomEvent("open-history-page"));
      });
    </script>
  </body>
</html>
